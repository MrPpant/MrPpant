      .cc5b { animation: show 0.01s 15.2s forwards, slide 2s steps(65) 15.2s forwards, blink 1.0s step-end 15.2s 2, hide 0.01s 18.4s forwards; --tx: 626px; }
      .r5b  { animation: slide 2s steps(65) 15.2s forwards, hide 0.01s 18.4s forwards; --tx: 626px; }

    <tspan x="20" dy="0" class="st line-26"><tspan x="20" dy="1.5em"><tspan fill="#e5c07b">@MrPpant</tspan> <tspan fill="#56b6c2">-&gt;</tspan> <tspan fill="#61afef">C:\Users\MrPpant</tspan> <tspan fill="#98c379">git(main)</tspan> <tspan fill="#d19a66">0.0s</tspan> <tspan fill="#e06c75" font-weight="bold"><tspan class="cursor">_</tspan></tspan></tspan></tspan>

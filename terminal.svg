<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="504" viewBox="0 0 1000 504">
  <defs>
    <style>
      .bg { fill: #0c0c0c; }
      .header-bg { fill: #1e1e1e; }
      .tab-bg { fill: #0c0c0c; }
      .text { font-family: 'Consolas', 'Courier New', monospace; font-size: 17px; fill: #abb2bf; }
      .window-ctrl { fill: #aaaaaa; }

      @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
      @keyframes hide { to { opacity: 0; visibility: hidden; } }
      @keyframes slide { from { transform: translateX(0); } to { transform: translateX(var(--tx)); } }
      @keyframes show { to { opacity: 1; } }

      .cursor { fill: #e06c75; font-family: 'Consolas', 'Courier New', monospace; font-size: 17px; opacity: 0; }

      .p0  { opacity: 0; animation: show 0.01s 0.3s forwards; }
      .cc0 { animation: show 0.01s 0.3s forwards, slide 1.3s steps(52) 0.3s forwards, blink 1.0s step-end 0.3s 3, hide 0.01s 2.8s forwards; --tx: 486px; }
      .r0  { animation: slide 1.3s steps(52) 0.3s forwards, hide 0.01s 2.8s forwards; --tx: 486px; }
      .p2  { opacity: 0; animation: show 0.01s 2.8s forwards; }
      .cc2 { animation: show 0.01s 2.8s forwards, slide 0.6s steps(6) 2.8s forwards, blink 1.0s step-end 2.8s 4, hide 0.01s 6.8s forwards; --tx: 56px; }

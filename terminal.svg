      .r5  { animation: slide 2s steps(70) 10.4s forwards, hide 0.01s 13.6s forwards; --tx: 655px; }
      .p5b  { opacity: 0; animation: show 0.01s 13.6s forwards; }
      .cc5b { animation: show 0.01s 13.6s forwards, slide 2s steps(75) 13.6s forwards, blink 1.0s step-end 13.6s 2, hide 0.01s 16.8s forwards; --tx: 701px; }
      .r5b  { animation: slide 2s steps(75) 13.6s forwards, hide 0.01s 16.8s forwards; --tx: 701px; }

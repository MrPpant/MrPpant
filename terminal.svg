<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="478" viewBox="0 0 1000 478">
  <defs>
    <style>
      .bg { fill: #0c0c0c; }
      .header-bg { fill: #1e1e1e; }
      .tab-bg { fill: #0c0c0c; }
      .text { font-family: 'Consolas', 'Courier New', monospace; font-size: 17px; fill: #abb2bf; }
      .window-ctrl { fill: #aaaaaa; }

      @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
      @keyframes hide { to { opacity: 0; visibility: hidden; } }
      @keyframes slide { from { transform: translateX(0); } to { transform: translateX(var(--tx)); } }
      @keyframes show { to { opacity: 1; } }

      .cursor { fill: #e06c75; font-family: 'Consolas', 'Courier New', monospace; font-size: 17px; opacity: 0; }

      .p0  { opacity: 0; animation: show 0.01s 0.3s forwards; }

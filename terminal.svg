<svg xmlns="http://www.w3.org/2000/svg" width="900" height="750" viewBox="0 0 900 750">
  <defs>
    <style>
      .bg { fill: #0c0c0c; rx: 8px; }
      .header-bg { fill: #1e1e1e; }
      .tab-bg { fill: #0c0c0c; }
      .text { font-family: 'Consolas', 'Courier New', monospace; font-size: 14px; }
      .window-ctrl { fill: #aaaaaa; }
      .cursor { animation: blink 1s step-end infinite; }
      
      @keyframes blink {
        0%, 100% { opacity: 1; }
        50% { opacity: 0; }
      }
      
      @keyframes typeLine {
        from { opacity: 0; transform: translateY(10px); }
        to { opacity: 1; transform: translateY(0); }
      }

      /* Instead of simply fading lines in slowly, let's make them appear quickly one after another */
      .st { opacity: 0; animation: typeLine 0.15s forwards; }
      .line-0 { animation-delay: 0.00s; }
      .line-1 { animation-delay: 0.20s; }
      .line-2 { animation-delay: 0.40s; }
      .line-3 { animation-delay: 0.60s; }
      .line-4 { animation-delay: 0.80s; }
      .line-5 { animation-delay: 1.00s; }

    <tspan x="20" dy="0" class="st line-20"><tspan x="20" dy="1.5em"></tspan></tspan>
    <tspan x="20" dy="0" class="st line-21"><tspan x="20" dy="1.5em" fill="#abb2bf">1 JavaScript/TypeScript, Python, Bash</tspan></tspan>
    <tspan x="20" dy="0" class="st line-22"><tspan x="20" dy="1.2em" fill="#abb2bf">2 React, Node.js, Next.js, Django</tspan></tspan>

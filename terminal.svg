<svg xmlns="http://www.w3.org/2000/svg" width="900" height="650" viewBox="0 0 900 650">
  <defs>
    <style>
      .bg { fill: #0c0c0c; rx: 8px; }
      .header-bg { fill: #1e1e1e; }
      .tab-bg { fill: #0c0c0c; }
      .text { font-family: 'Consolas', 'Courier New', monospace; font-size: 14px; }
      .window-ctrl { fill: #aaaaaa; }
      .cursor { animation: blink 1s step-end infinite; }
      
      @keyframes blink {
        0%, 100% { opacity: 1; }
        50% { opacity: 0; }
      }
      
      @keyframes fadeInUp {
        from { opacity: 0; transform: translateY(10px); }
        to { opacity: 1; transform: translateY(0); }
      }
      
      .st { opacity: 0; animation: fadeInUp 0.3s forwards; }
      .line-0 { animation-delay: 0.0s; }
      .line-1 { animation-delay: 0.4s; }
      .line-2 { animation-delay: 0.8s; }
      .line-3 { animation-delay: 1.2s; }
      .line-4 { animation-delay: 1.6s; }
      .line-5 { animation-delay: 2.0s; }
      .line-6 { animation-delay: 2.4s; }
      .line-7 { animation-delay: 2.8s; }
      .line-8 { animation-delay: 3.2s; }
      .line-9 { animation-delay: 3.6s; }
      .line-10 { animation-delay: 4.0s; }
      .line-11 { animation-delay: 4.4s; }
      .line-12 { animation-delay: 4.8s; }
      .line-13 { animation-delay: 5.2s; }
      .line-14 { animation-delay: 5.6s; }
      .line-15 { animation-delay: 6.0s; }
      .line-16 { animation-delay: 6.4s; }
      .line-17 { animation-delay: 6.8s; }
      .line-18 { animation-delay: 7.2s; }
      .line-19 { animation-delay: 7.6s; }
      .line-20 { animation-delay: 8.0s; }
      .line-21 { animation-delay: 8.4s; }
      .line-22 { animation-delay: 8.8s; }
      .line-23 { animation-delay: 9.2s; }
      .line-24 { animation-delay: 9.6s; }
      .line-25 { animation-delay: 10.0s; }
      .line-26 { animation-delay: 10.4s; }
    </style>
  </defs>
  
  <!-- Window Background -->
  <rect class="bg" width="100%" height="100%" />
  
  <!-- Window Header (Windows Terminal Style) -->
  <path class="header-bg" d="M8,0 h884 a8,8 0 0,1 8,8 v32 h-900 v-32 a8,8 0 0,1 8,-8 z" />
  
  <!-- PowerShell Tab -->
  <path class="tab-bg" d="M10,8 h150 a8,8 0 0,1 8,8 v24 h-166 v-24 a8,8 0 0,1 8,-8 z" />
